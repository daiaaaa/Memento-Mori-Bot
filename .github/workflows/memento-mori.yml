name: Memento Mori Bot

on:
  schedule:
    - cron: '0 12 * * *'  # 12:00 UTC = 09:00 Brasil
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run script
        run: python main.py

      - name: Commit changes
        run: |
          git config --global user.name "memento-mori-bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "🕯 Memento Mori update"
          git push